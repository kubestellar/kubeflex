name: goreleaser

on:
  push:
    tags:
    - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: kubestellar/kubeflex/manager
  IMAGE_NAME: ${{ github.repository }}/chart
  CHART_PATH: ./chart

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0

    - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
      with:
        go-version: v1.24

    - name: Delete non-semver tags
      run: 'git tag -d $(git tag -l | grep -v "^v")'

    - name: Set LDFLAGS
      run: echo LDFLAGS="$(make ldflags)" >> $GITHUB_ENV

    - name: Run GoReleaser on tag
      uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29
      with:
        distribution: goreleaser
        version: 2
        args: release --timeout 60m --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        KO_TOKEN: ${{ secrets.TOKEN }}
        USER: ${{ github.actor }}
        EMAIL: ${{ github.actor}}@users.noreply.github.com

    - name: Set up Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to registry
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Package and push chart
      run: |
        make chart IMG=${{ env.REGISTRY }}/${{ env.OPERATOR_IMAGE }}:${{github.ref_name}}
        helm package ${{ env.CHART_PATH }} --destination . --version ${{github.ref_name}} --app-version ${{github.ref_name}} --dependency-update
        helm push ./*.tgz oci://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    - name: Trigger docs version branch
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ secrets.WORKFLOW_SYNC_TOKEN }}
        repository: kubestellar/docs
        event-type: create-version-branch
        client-payload: |
          {
            "project": "kubeflex",
            "version": "${{ github.ref_name }}",
            "source_repo": "${{ github.repository }}",
            "source_branch": "main"
          }

